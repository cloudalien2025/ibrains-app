name: CI DirectoryIQ

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "fix/**"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies (npm ci)
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Build
        run: npm run build