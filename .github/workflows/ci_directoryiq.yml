name: CI (DirectoryIQ)

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Run unit tests (Vitest)
        run: pnpm run test

      - name: Build (Next.js)
        run: pnpm run build
