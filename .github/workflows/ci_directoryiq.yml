name: CI DirectoryIQ

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "fix/**"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Tests (if present)
        run: |
          set -e
          if pnpm -s run | grep -qE '(^|\s)test($|\s)'; then
            pnpm test
          else
            echo "No test script found; skipping tests."
          fi

      - name: Build
        run: pnpm build