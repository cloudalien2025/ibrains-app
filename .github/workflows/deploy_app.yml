name: Deploy iBrains App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write release metadata
        run: |
          set -e
          mkdir -p app/_meta
          BUILD_TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          GIT_SHA="${GITHUB_SHA}"
          SHORT_SHA="${GITHUB_SHA::7}"
          APP_ENV="production"
          cat > app/_meta/release.json <<EOF
          {
            "service": "ibrains",
            "environment": "${APP_ENV}",
            "git_sha": "${GIT_SHA}",
            "git_sha_short": "${SHORT_SHA}",
            "build_timestamp": "${BUILD_TIMESTAMP}",
            "build_id": "${GITHUB_RUN_ID}",
            "source": "github_actions"
          }
          EOF

      - name: Build Next.js app
        run: npm run build

      - name: Create deployment artifact
        run: |
          mkdir -p artifacts
          tar -czf artifacts/build.tar.gz \
          .next \
          package.json \
          package-lock.json \
          public \
          next.config.ts \
          app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ibrains-build
          path: artifacts/build.tar.gz


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ibrains-build
          path: artifacts

      - name: Copy artifact to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: artifacts/build.tar.gz
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy on droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            tar -xzf ${{ secrets.DEPLOY_PATH }}/artifacts/build.tar.gz
            rm -f ${{ secrets.DEPLOY_PATH }}/artifacts/build.tar.gz

            npm ci --omit=dev

            systemctl restart ${{ secrets.SERVICE_NAME }}

            ready=0
            for attempt in $(seq 1 10); do
              if curl -fsS http://127.0.0.1:3001/api/_meta/release; then
                ready=1
                break
              fi
              sleep 2
            done

            if [ "$ready" -ne 1 ]; then
              echo "release endpoint did not become ready after restart"
              systemctl status ${{ secrets.SERVICE_NAME }} --no-pager -l || true
              journalctl -u ${{ secrets.SERVICE_NAME }} -n 150 --no-pager || true
              exit 1
            fi
