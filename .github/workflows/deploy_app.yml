name: Deploy iBrains App

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write release metadata
        run: |
          set -e
          mkdir -p app/_meta
          BUILD_TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          GIT_SHA="${GITHUB_SHA}"
          SHORT_SHA="${GITHUB_SHA::7}"
          APP_ENV="production"
          cat > app/_meta/release.json <<EOF
          {
            "service": "ibrains",
            "environment": "${APP_ENV}",
            "git_sha": "${GIT_SHA}",
            "git_sha_short": "${SHORT_SHA}",
            "build_timestamp": "${BUILD_TIMESTAMP}",
            "build_id": "${GITHUB_RUN_ID}",
            "source": "github_actions"
          }
          EOF

      - name: Build Next.js app
        run: npm run build

      - name: Create deployment artifact
        run: |
          tar -czf build.tar.gz \
          .next \
          package.json \
          package-lock.json \
          public \
          next.config.js \
          app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ibrains-build
          path: build.tar.gz


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ibrains-build

      - name: Copy artifact to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: build.tar.gz
          target: /root/

      - name: Deploy on droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd /root/ibrains-app

            tar -xzf /root/build.tar.gz

            npm ci --omit=dev

            systemctl restart ibrains-next.service

            sleep 2

            curl -s http://127.0.0.1:3001/api/_meta/release
